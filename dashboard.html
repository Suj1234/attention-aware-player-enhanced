<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attention Analytics Dashboard</title>
  <meta name="description" content="Personal viewing intelligence dashboard — track your attention patterns across all streaming sessions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #0a0c12;
      --surface:   #12151e;
      --surface2:  #1a1e2a;
      --border:    #252938;
      --accent:    #6c63ff;
      --accent2:   #38bdf8;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #0f1120 0%, #1a1040 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header-text h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .header-text p  { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .session-count {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      color: var(--muted);
    }
    .session-count strong { color: var(--accent2); font-weight: 600; }

    /* ── Layout ──────────────────────────────────────────────── */
    .container { max-width: 1280px; margin: 0 auto; padding: 32px 40px; }

    /* ── Stat cards ──────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
    .stat-card .sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .val-green { color: var(--green); }
    .val-red   { color: var(--red); }
    .val-amber { color: var(--amber); }
    .val-blue  { color: var(--accent2); }

    /* ── Charts section ──────────────────────────────────────── */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 860px) { .charts-row { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      padding: 2px 8px;
      color: var(--muted);
    }
    .chart-wrap { position: relative; height: 240px; }

    /* ── Timeline ────────────────────────────────────────────── */
    .timeline-wrap { height: 56px; position: relative; }
    .timeline-bar {
      position: absolute; top: 50%; transform: translateY(-50%);
      left: 0; right: 0; height: 28px;
      background: var(--surface2);
      border-radius: 6px;
      overflow: hidden;
    }
    .timeline-segment {
      position: absolute; top: 0; height: 100%;
      transition: opacity 0.15s;
    }
    .timeline-segment:hover { opacity: 0.8; cursor: pointer; }
    .seg-watching { background: var(--green); }
    .seg-away     { background: var(--red); opacity: 0.75; }
    .seg-absent   { background: var(--amber); opacity: 0.7; }
    .seg-drowsy   { background: #a855f7; opacity: 0.85; }
    .timeline-legend {
      display: flex; gap: 18px; margin-top: 12px; flex-wrap: wrap;
    }
    .leg-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* ── Session table ───────────────────────────────────────── */
    .table-wrap { overflow-x: auto; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:hover td { background: var(--surface2); }
    tr:last-child td { border-bottom: none; }
    .pill {
      display: inline-block;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill-green  { background: rgba(34,197,94,.15);  color: var(--green); }
    .pill-red    { background: rgba(239,68,68,.15);   color: var(--red); }
    .pill-amber  { background: rgba(245,158,11,.15);  color: var(--amber); }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; }

    /* ── Platform badge ──────────────────────────────────────── */
    .platform-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 10px; border-radius: 20px; font-size: 11px;
      background: var(--surface2); border: 1px solid var(--border);
    }

    /* ── Tooltip ─────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    /* section header */
    .section-title {
      font-size: 16px; font-weight: 600;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1; height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">👁</div>
  <div class="header-text">
    <h1>Attention Analytics</h1>
    <p>Personal Viewing Intelligence Dashboard</p>
  </div>
  <div class="session-count" id="sessionCountBadge">
    Loading sessions…
  </div>
</header>

<div class="container" id="app">
  <div class="empty-state">
    <div class="icon">📂</div>
    <h2>Loading sessions…</h2>
    <p>Reading your session files from the sessions/ directory.</p>
  </div>
</div><!-- /app -->

<div id="tooltip"></div>

<script>
// ─────────────────────────── DATA LAYER ──────────────────────────────
// This dashboard reads session JSON files.
// Since we're opened as a local file:// page, we use a hardcoded
// SESSIONS_DATA array that is populated by the Python launcher or
// by the user pasting their JSON below.
// When opened via `open dashboard.html` on macOS the Python script
// injects the sessions data into the page via URL hash or query string,
// OR we just scan the sessions/ folder via a small embedded server.
// For the static case we use window.__SESSIONS if defined, else demo data.

const DEMO_SESSIONS = [
  {
    date: "2025-06-01", time: "20:30", platform: "netflix",
    title: "Stranger Things S4E1", duration_sec: 3600, attention_pct: 87,
    events: [
      {t:0,      type:"looking",  video_ms:0},
      {t:120000, type:"away",     video_ms:120000},
      {t:122000, type:"looking",  video_ms:125000},
      {t:300000, type:"absent",   video_ms:300000},
      {t:430000, type:"back",     video_ms:430000},
      {t:900000, type:"drowsy",   video_ms:900000},
      {t:902000, type:"looking",  video_ms:902000},
    ]
  },
  {
    date: "2025-06-02", time: "21:00", platform: "prime",
    title: "The Boys S4E3", duration_sec: 2700, attention_pct: 72,
    events: [
      {t:0,      type:"looking",  video_ms:0},
      {t:200000, type:"away",     video_ms:200000},
      {t:209000, type:"looking",  video_ms:213000},
      {t:500000, type:"absent",   video_ms:500000},
      {t:650000, type:"back",     video_ms:650000},
    ]
  },
  {
    date: "2025-06-03", time: "19:45", platform: "youtube",
    title: "Tutorial: React Deep Dive", duration_sec: 5400, attention_pct: 91,
    events: [
      {t:0,       type:"looking", video_ms:0},
      {t:1800000, type:"away",    video_ms:1800000},
      {t:1803000, type:"looking", video_ms:1806000},
    ]
  },
];

// Try to load sessions from embedded data (injected by Python), else use demo
const sessions = (typeof window.__SESSIONS !== 'undefined' && window.__SESSIONS.length > 0)
  ? window.__SESSIONS
  : DEMO_SESSIONS;

// ─────────────────────────── HELPERS ─────────────────────────────────
function fmtDuration(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtMs(ms) {
  return fmtDuration(Math.round(ms / 1000));
}

function avg(arr) {
  return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
}

function platformIcon(name) {
  const icons = {netflix:'🎬', prime:'📦', youtube:'▶️', hotstar:'⭐', jiocinema:'🎭', appletv:'🍎'};
  return icons[name] || '📺';
}

// ─────────────────────────── AGGREGATE STATS ─────────────────────────
function computeStats(sessions) {
  const totalSec   = sessions.reduce((a,s)=>a+s.duration_sec, 0);
  const avgAttn    = Math.round(avg(sessions.map(s=>s.attention_pct)));
  const drowsyCnt  = sessions.reduce((a,s)=> a+s.events.filter(e=>e.type==='drowsy').length, 0);
  const awayCnt    = sessions.reduce((a,s)=> a+s.events.filter(e=>e.type==='away').length,   0);
  return { totalSec, avgAttn, drowsyCnt, awayCnt };
}

// Compute watching/away time per session from events
function parseTimeline(session) {
  const events = session.events;
  const dur = session.duration_sec * 1000;
  const segments = [];
  let lastT = 0, lastType = 'looking';

  events.forEach(ev => {
    const t = Math.min(ev.t, dur);
    if (t > lastT) {
      segments.push({ type: lastType, start: lastT, end: t });
    }
    lastT = t;
    lastType = ev.type === 'away' || ev.type === 'absent' || ev.type === 'drowsy'
      ? ev.type : 'looking';
  });
  if (lastT < dur) segments.push({ type: lastType, start: lastT, end: dur });
  return segments;
}

// ─────────────────────────── RENDER ──────────────────────────────────
function render() {
  const app = document.getElementById('app');
  document.getElementById('sessionCountBadge').innerHTML =
    `<strong>${sessions.length}</strong> session${sessions.length !== 1 ? 's' : ''} recorded`;

  if (!sessions.length) {
    app.innerHTML = `
      <div class="empty-state">
        <div class="icon">🍿</div>
        <h2>No sessions yet</h2>
        <p>Run <code>python head/stream_attention.py</code>, watch something, quit with <kbd>q</kbd>.<br>
        Your session data will appear here automatically.</p>
      </div>`;
    return;
  }

  const stats = computeStats(sessions);

  app.innerHTML = `
    <!-- Stat cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Total Watch Time</div>
        <div class="value val-blue">${fmtDuration(stats.totalSec)}</div>
        <div class="sub">${sessions.length} session${sessions.length!==1?'s':''}</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Attention</div>
        <div class="value ${stats.avgAttn>=80?'val-green':stats.avgAttn>=60?'val-amber':'val-red'}">${stats.avgAttn}%</div>
        <div class="sub">across all sessions</div>
      </div>
      <div class="stat-card">
        <div class="label">Drowsy Events</div>
        <div class="value val-amber">${stats.drowsyCnt}</div>
        <div class="sub">total drowsiness pauses</div>
      </div>
      <div class="stat-card">
        <div class="label">Away Events</div>
        <div class="value val-red">${stats.awayCnt}</div>
        <div class="sub">total distraction count</div>
      </div>
    </div>

    <!-- Charts row -->
    <div class="charts-row">
      <div class="card">
        <div class="card-title">📊 Weekly Attention Trend <span class="badge">last ${sessions.length} sessions</span></div>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">🍩 Latest Session Breakdown</div>
        <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
      </div>
    </div>

    <!-- Attention timeline for latest session -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-title">⏱ Attention Timeline — <em id="latestTitle">${sessions[sessions.length-1].title}</em></div>
      <div class="timeline-wrap" id="timelineWrap"></div>
      <div class="timeline-legend">
        <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div> Watching</div>
        <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div> Away</div>
        <div class="leg-item"><div class="leg-dot" style="background:#f59e0b"></div> Absent</div>
        <div class="leg-item"><div class="leg-dot" style="background:#a855f7"></div> Drowsy</div>
      </div>
    </div>

    <!-- Session history table -->
    <div class="section-title">Session History</div>
    <div class="card table-wrap">
      <table id="sessionTable">
        <thead>
          <tr>
            <th>Date &amp; Time</th>
            <th>Platform</th>
            <th>Title</th>
            <th>Duration</th>
            <th>Attention</th>
            <th>Events</th>
          </tr>
        </thead>
        <tbody id="sessionTbody"></tbody>
      </table>
    </div>
  `;

  buildTimeline();
  buildTrendChart();
  buildDonutChart();
  buildTable();
}

// ── Timeline ──────────────────────────────────────────────────────────
function buildTimeline() {
  const session  = sessions[sessions.length - 1];
  const segments = parseTimeline(session);
  const dur      = session.duration_sec * 1000;
  const wrap     = document.getElementById('timelineWrap');
  wrap.innerHTML  = `<div class="timeline-bar" id="tlBar"></div>`;
  const bar       = document.getElementById('tlBar');
  const tooltip   = document.getElementById('tooltip');

  segments.forEach(seg => {
    const el   = document.createElement('div');
    const left = (seg.start / dur) * 100;
    const w    = ((seg.end - seg.start) / dur) * 100;
    el.className = `timeline-segment seg-${seg.type === 'looking' ? 'watching' : seg.type}`;
    el.style.left  = `${left}%`;
    el.style.width = `${w}%`;
    el.title = `${seg.type} — ${fmtMs(seg.start)} → ${fmtMs(seg.end)}`;

    el.addEventListener('mousemove', e => {
      tooltip.style.display = 'block';
      tooltip.style.left    = `${e.clientX + 14}px`;
      tooltip.style.top     = `${e.clientY - 32}px`;
      tooltip.textContent   = el.title;
    });
    el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    bar.appendChild(el);
  });
}

// ── Trend Chart ───────────────────────────────────────────────────────
function buildTrendChart() {
  const labels = sessions.map(s => `${s.date} ${s.time}`);
  const data   = sessions.map(s => s.attention_pct);

  new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Attention %',
        data,
        borderColor:     '#6c63ff',
        backgroundColor: 'rgba(108,99,255,0.12)',
        borderWidth:     2.5,
        pointBackgroundColor: data.map(v => v >= 80 ? '#22c55e' : v >= 60 ? '#f59e0b' : '#ef4444'),
        pointRadius:  5,
        pointHoverRadius: 7,
        tension: 0.4,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1e2a',
          borderColor: '#252938',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', maxRotation: 30, font: { size: 10 } }, grid: { color: '#252938' } },
        y: {
          min: 0, max: 100,
          ticks: { color: '#64748b', callback: v => `${v}%` },
          grid: { color: '#252938' }
        }
      }
    }
  });
}

// ── Donut Chart ───────────────────────────────────────────────────────
function buildDonutChart() {
  const session  = sessions[sessions.length - 1];
  const segments = parseTimeline(session);
  let watchMs = 0, awayMs = 0, absentMs = 0, drowsyMs = 0;
  segments.forEach(s => {
    const d = s.end - s.start;
    if (s.type === 'looking')  watchMs  += d;
    else if (s.type === 'away')    awayMs   += d;
    else if (s.type === 'absent')  absentMs += d;
    else if (s.type === 'drowsy')  drowsyMs += d;
  });

  new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: ['Watching', 'Away', 'Absent', 'Drowsy'],
      datasets: [{
        data: [watchMs, awayMs, absentMs, drowsyMs].map(v => Math.round(v/1000)),
        backgroundColor: ['#22c55e','#ef4444','#f59e0b','#a855f7'],
        borderColor: '#12151e',
        borderWidth: 3,
        hoverOffset: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '70%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#94a3b8', font: { size: 12 }, padding: 14, boxWidth: 12 }
        },
        tooltip: {
          backgroundColor: '#1a1e2a',
          borderColor: '#252938',
          borderWidth: 1,
          bodyColor: '#94a3b8',
          callbacks: { label: ctx => ` ${fmtDuration(ctx.raw)}` }
        }
      }
    }
  });
}

// ── Session Table ─────────────────────────────────────────────────────
function buildTable() {
  const tbody = document.getElementById('sessionTbody');
  [...sessions].reverse().forEach(s => {
    const pct  = s.attention_pct;
    const pill = pct >= 80 ? 'pill-green' : pct >= 60 ? 'pill-amber' : 'pill-red';
    const awayCnt   = s.events.filter(e=>e.type==='away').length;
    const drowsyCnt = s.events.filter(e=>e.type==='drowsy').length;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${s.date} &nbsp;<span style="color:var(--muted)">${s.time}</span></td>
      <td><span class="platform-badge">${platformIcon(s.platform)} ${s.platform}</span></td>
      <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.title}</td>
      <td>${fmtDuration(s.duration_sec)}</td>
      <td><span class="pill ${pill}">${pct}%</span></td>
      <td style="color:var(--muted)">${awayCnt > 0 ? `<span style="color:#ef4444">↩︎ away ×${awayCnt}</span>` : ''}
          ${drowsyCnt > 0 ? `&nbsp;<span style="color:#a855f7">💤 ×${drowsyCnt}</span>` : ''}
          ${(awayCnt+drowsyCnt)===0?'<span style="color:#22c55e">✔ No distractions</span>':''}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Bootstrap
render();
</script>
</body>
</html>
